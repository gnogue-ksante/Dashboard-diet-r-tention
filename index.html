
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  --r-lg: 14px; --r-xl: 20px; --trans: 140ms ease;
  --db: #5B0F9E; --db-l: #EDE0FF; --db-m: #C9A8F5; --db-d: #3D0A6E;
  --kd: #A8D94A; --kd-l: #EEF9D0; --kd-m: #CAEA82; --kd-d: #5A7A1A;
}
.shell { padding: 0 0 2rem; font-family: var(--font); }

/* ── NAV ── */
.nav-strip { display:flex; flex-wrap:wrap; gap:6px; padding-bottom:16px; border-bottom:1px solid var(--color-border-tertiary); margin-bottom:18px; }
.nb { font-size:12px; font-weight:500; padding:5px 13px; border-radius:20px; cursor:pointer; border:1px solid var(--color-border-tertiary); background:var(--color-background-secondary); color:var(--color-text-secondary); transition:var(--trans); }
.nb:hover { color:var(--color-text-primary); border-color:var(--color-border-secondary); }
.nb.on { background:var(--color-text-primary); color:var(--color-background-primary); border-color:var(--color-text-primary); }
.nb.all-nb { border-color:var(--db); color:var(--db); }
.nb.all-nb.on { background:var(--db); color:#fff; }
.nb.nb-cl { border-color:#185FA5; color:#185FA5; }
.nb.nb-cl.on { background:#185FA5; color:#fff; border-color:#185FA5; }
.nb.nb-ltv { border-color:#0F6E56; color:#0F6E56; }
.nb.nb-ltv.on { background:#0F6E56; color:#fff; border-color:#0F6E56; }
.panel { display:none; } .panel.on { display:block; }

/* ── HEADER ── */
.hcard { display:flex; align-items:flex-start; gap:14px; padding:18px 20px; border-radius:var(--r-xl); background:var(--color-background-secondary); border:1px solid var(--color-border-tertiary); margin-bottom:14px; }
.av { width:48px; height:48px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; border:2px solid transparent; }
.hinfo .hname { font-size:18px; font-weight:600; color:var(--color-text-primary); margin-bottom:3px; }
.hinfo .hsub  { font-size:12px; color:var(--color-text-secondary); margin-bottom:7px; }
.bdg { display:inline-block; font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; line-height:1.4; }
.bdg-int  { background:var(--db-l); color:var(--db-d); border:1px solid var(--db-m); }
.bdg-ext  { background:var(--color-background-secondary); color:var(--color-text-secondary); border:1px solid var(--color-border-tertiary); }
.bdg-all  { background:var(--db-l); color:var(--db); border:1px solid var(--db); }
.bdg-warn { background:#FFF3E0; color:#B45309; border:1px solid #FCD34D; }

/* ── KPI GRID ── */
.kpi-grid { display:grid; grid-template-columns:160px 1fr 1.8fr; gap:10px; margin-bottom:14px; align-items:stretch; }

/* période */
.per-card { border-radius:var(--r-lg); border:1px solid var(--color-border-tertiary); background:var(--color-background-primary); padding:12px 14px; display:flex; flex-direction:column; gap:6px; }
.per-ttl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--color-text-secondary); margin-bottom:4px; }
.per-btn { font-size:13px; font-weight:500; padding:11px 14px; border-radius:10px; border:1.5px solid var(--color-border-tertiary); background:transparent; color:var(--color-text-secondary); cursor:pointer; text-align:left; transition:var(--trans); width:100%; line-height:1.2; }
.per-btn:hover { color:var(--color-text-primary); border-color:var(--color-border-secondary); background:var(--color-background-secondary); }
.per-btn.on { background:var(--color-text-primary); color:var(--color-background-primary); border-color:var(--color-text-primary); box-shadow:0 2px 8px rgba(0,0,0,.18); font-size:16px; font-weight:700; padding:13px 14px; }

/* rangs */
.rang-card { border-radius:var(--r-lg); border:1px solid var(--color-border-tertiary); background:var(--color-background-primary); overflow:hidden; display:flex; flex-direction:column; }
.rang-row { padding:10px 14px; border-bottom:1px solid var(--color-border-tertiary); flex:1; display:flex; flex-direction:column; justify-content:center; }
.rang-row:last-child { border-bottom:none; }
.rang-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--color-text-secondary); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
.rang-val { font-size:21px; font-weight:700; line-height:1; }
.rang-val em { font-size:12px; font-weight:400; font-style:normal; color:var(--color-text-secondary); }
.rang-sub { font-size:11px; color:var(--color-text-secondary); margin-top:2px; }

.kpi-c { padding:13px 15px; border-radius:var(--r-lg); border:1px solid var(--color-border-tertiary); background:var(--color-background-primary); }
.kpi-lbl { font-size:11px; font-weight:500; color:var(--color-text-secondary); margin-bottom:7px; text-transform:uppercase; letter-spacing:.06em; line-height:1.3; }
.kpi-val { font-size:22px; font-weight:600; line-height:1; margin-bottom:3px; }
.kpi-sub { font-size:11px; color:var(--color-text-secondary); }

/* ── MARGE CARD ── */
.mc { padding:13px 15px; border-radius:var(--r-lg); border:1px solid var(--color-border-tertiary); background:var(--color-background-primary); display:flex; flex-direction:column; }
.mc-ttl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--color-text-secondary); margin-bottom:10px; }
.mc-rows { display:flex; flex-direction:column; gap:9px; }
.mc-row { display:flex; flex-direction:column; gap:4px; }
.mc-top { display:flex; align-items:baseline; gap:7px; }
.mc-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; position:relative; top:-1px; }
.mc-brand { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; min-width:36px; }
.mc-v { font-family:var(--mono); font-size:17px; font-weight:600; }
.mc-d { font-size:11px; margin-left:2px; }
.mc-d.up { color:#0D9060; } .mc-d.dn { color:#C0392B; }
.mc-bs { padding-left:18px; }
.mc-bw { position:relative; height:6px; border-radius:10px; background:var(--color-border-tertiary); margin-bottom:4px; overflow:visible; }
.mc-mk { position:absolute; top:-3px; width:2px; height:12px; border-radius:1px; background:var(--color-text-secondary); opacity:.4; }
.mc-bf { height:100%; border-radius:10px; position:absolute; left:0; top:0; }
.mc-lg { display:flex; justify-content:space-between; }
.mc-li { display:flex; flex-direction:column; gap:1px; }
.mc-ll { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--color-text-secondary); opacity:.7; }
.mc-lv { font-family:var(--mono); font-size:10px; font-weight:600; color:var(--color-text-secondary); }
.mc-sep { height:1px; background:var(--color-border-tertiary); margin:1px 0; }
.mc-note { margin-top:8px; padding-top:8px; border-top:1px solid var(--color-border-tertiary); font-size:9.5px; color:var(--color-text-secondary); line-height:1.5; }
.mc-note strong { color:var(--color-text-primary); font-weight:600; }

/* ── BRAND LEGEND ── */
.bleg { display:flex; gap:14px; margin-bottom:12px; }
.bleg-item { display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:500; color:var(--color-text-secondary); }
.bleg-dot { width:11px; height:11px; border-radius:3px; }

/* ── TABS ── */
.tab-bar { display:flex; gap:2px; margin-bottom:14px; background:var(--color-background-secondary); border-radius:10px; padding:3px; width:fit-content; }
.tb { font-size:12px; font-weight:500; padding:6px 14px; border-radius:8px; cursor:pointer; border:none; background:transparent; color:var(--color-text-secondary); transition:var(--trans); }
.tb:hover { color:var(--color-text-primary); }
.tb.on { background:var(--color-background-primary); color:var(--color-text-primary); box-shadow:0 1px 3px rgba(0,0,0,.08); }
.tb-analyse { font-size:16px; font-weight:700; padding:7px 20px; }
.tb-analyse.on { font-size:16px; }
.tab-c { display:none; } .tab-c.on { display:block; }

/* ── ANALYSE ── */
.an-sec { display:flex; flex-direction:column; gap:14px; }
.b-sec { border-radius:var(--r-lg); overflow:hidden; border:1px solid var(--color-border-tertiary); }
.b-hd { display:flex; align-items:center; gap:10px; padding:11px 16px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
.b-bd { padding:14px 16px; background:var(--color-background-primary); font-size:13px; color:var(--color-text-secondary); line-height:1.75; }
.b-bd strong { color:var(--color-text-primary); font-weight:600; }
.verdict { padding:14px 18px; border-radius:var(--r-lg); border-left:3px solid var(--db); background:var(--color-background-secondary); border-top:1px solid var(--color-border-tertiary); border-right:1px solid var(--color-border-tertiary); border-bottom:1px solid var(--color-border-tertiary); }
.verdict-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--db); margin-bottom:5px; }
.verdict-txt { font-size:13px; color:var(--color-text-secondary); line-height:1.7; }
.verdict-txt strong { color:var(--color-text-primary); font-weight:600; }

/* ── TABLE ── */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead tr { border-bottom:1px solid var(--color-border-tertiary); }
th { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--color-text-secondary); padding:8px 10px; text-align:left; white-space:nowrap; }
td { padding:9px 10px; color:var(--color-text-primary); border-bottom:1px solid var(--color-border-tertiary); white-space:nowrap; vertical-align:middle; }
tr:last-child td { border-bottom:none; }

/* row colors matching capture */
.rw-db   td { background:rgba(91,15,158,.03); }
.rw-kd   td { background:rgba(90,122,26,.04); }
.rw-tot  td { background:rgba(91,15,158,.07); font-weight:500; }
tr:hover td { background:var(--color-background-secondary) !important; }

.pill { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; font-family:var(--mono); }
.p-db  { background:var(--db-l); color:var(--db); }
.p-kd  { background:var(--kd-l); color:var(--kd-d); }
.p-tot { background:#F3F4F6; color:#374151; }

.rk { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; font-size:12px; font-weight:700; font-family:var(--mono); }
.r1{background:#DCFCE7;color:#14532D}.r2{background:#D1FAE5;color:#065F46}.r3{background:#CCFBF1;color:#0F766E}
.r4{background:#F3F4F6;color:#374151}.r5{background:#F3F4F6;color:#6B7280}.r6{background:#F9FAFB;color:#9CA3AF}
.r7{background:#FEF3C7;color:#92400E}.r8{background:#FEE2E2;color:#991B1B}.r9{background:#FEE2E2;color:#7F1D1D}

.bt { width:60px; height:5px; background:var(--color-border-tertiary); border-radius:10px; display:inline-block; vertical-align:middle; overflow:hidden; }
.bf { height:100%; border-radius:10px; }
.bfg{background:#0D9060}.bfr{background:#C0392B}.bfdb{background:var(--db)}.bfkd{background:var(--kd-d)}

.c-db{color:var(--db)}.c-kd{color:var(--kd-d)}.c-g{color:#0D9060}.c-r{color:#C0392B}.c-a{color:#B45309}.c-mu{color:var(--color-text-secondary)}
.ev-up{color:#0D9060;font-size:16px;font-weight:700}.ev-dn{color:#C0392B;font-size:16px;font-weight:700}.ev-eq{color:var(--color-text-secondary);font-size:16px}

/* LTV section headers */
.ltv-hd { display:flex; align-items:center; gap:8px; margin:0 0 8px; }
.ltv-sec { margin-bottom:18px; }
.ref-bar { padding:9px 12px; background:var(--color-background-secondary); border-radius:8px; font-size:11px; color:var(--color-text-secondary); margin-top:10px; }
.ref-bar strong { color:var(--color-text-primary); font-weight:600; }

/* ALL banner */
.all-bn { padding:14px 18px; border-radius:var(--r-lg); background:var(--db-l); border:1px solid var(--db-m); margin-bottom:14px; }
.all-bn-t { font-size:11px; font-weight:700; color:var(--db); text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px; }
.all-bn-b { font-size:12.5px; color:var(--db-d); line-height:1.55; }
.all-bn-b strong { font-weight:600; }
.ablk { padding:15px 18px; border-radius:var(--r-lg); background:var(--color-background-secondary); border:1px solid var(--color-border-tertiary); }
.ablk-t { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--color-text-secondary); margin-bottom:9px; padding-bottom:8px; border-bottom:1px solid var(--color-border-tertiary); }
.ablk-b { font-size:13px; color:var(--color-text-secondary); line-height:1.75; }
.ablk-b strong { color:var(--color-text-primary); font-weight:600; }
/* ── CHART ── */
.chart-wrap { padding:16px; border-radius:var(--r-lg); border:1px solid var(--color-border-tertiary); background:var(--color-background-primary); margin-bottom:14px; }
.chart-ttl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--color-text-secondary); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
.chart-leg { display:flex; gap:14px; }
.chart-leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--color-text-secondary); }
.chart-svg { width:100%; overflow:visible; }
.chart-toggle { display:flex; gap:4px; margin-bottom:12px; }
.ct-btn { font-size:11px; font-weight:600; padding:4px 12px; border-radius:6px; cursor:pointer; border:1.5px solid var(--color-border-tertiary); background:transparent; color:var(--color-text-secondary); transition:var(--trans); }
.ct-btn:hover { color:var(--color-text-primary); border-color:var(--color-border-secondary); }
.ct-btn.on { border-color:var(--db); color:var(--db); background:var(--db-l); }
.chart-ref-line { stroke-dasharray:4,3; stroke-width:1; opacity:.5; }
.chart-area { opacity:.08; }

.sr { display:flex; gap:10px; align-items:baseline; padding:6px 10px; background:var(--color-background-primary); border-radius:8px; border:1px solid var(--color-border-tertiary); }
.sv { font-family:var(--mono); font-size:11px; font-weight:600; min-width:68px; }
.sl { font-size:12px; color:var(--color-text-secondary); }
</style>

<script>window.onerror=function(msg,src,line,col,err){

      '<button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;border-radius:8px;border:1.5px solid #5B0F9E;background:#EDE0FF;color:#5B0F9E;font-weight:600;cursor:pointer">Recharger</button>'+
    '</div>';
  }
  return false;
};</script>
<div id="loading-overlay" style="position:fixed;inset:0;background:var(--color-background-primary,#fff);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:'DM Sans',sans-serif;">

function pct(v){const s=((v-1)*100).toFixed(1);return (v>=1?'+':'')+s+'%';}
function rC(r){return 'r'+Math.min(r,9);}
function bp(b){return b==='DB'?`<span class="pill p-db">DB</span>`:b==='KD'?`<span class="pill p-kd">KD</span>`:`<span class="pill p-tot">TOTAL</span>`;}
function bbar(v,brand){
  const a=v>=1,w=Math.min(Math.abs(v-1)*5*100,100).toFixed(0);
  const cls=brand==='DB'?'bfdb':brand==='KD'?'bfkd':a?'bfg':'bfr';
  return `<span class="bt"><span class="bf ${cls}" style="width:${w}%"></span></span>`;
}
function ev(cur,prev){
  if(!prev) return '<span class="ev-eq">—</span>';
  return cur>prev?'<span class="ev-up">↑</span>':'<span class="ev-dn">↓</span>';
}
// Tab registry: stores tabs arrays per uid
const _tabReg={};
function regTabs(uid,tabs){_tabReg[uid]=tabs;}
function showTab(uid,idx){
  const tabs=_tabReg[uid];
  if(!tabs) return;
  tabs.forEach((t,i)=>{
    const el=document.getElementById(uid+'-'+t);
    if(el) el.style.display=(i===idx)?'block':'none';
  });
  document.querySelectorAll('[data-stab-uid="'+uid+'"]').forEach(b=>{
    b.classList.toggle('on', parseInt(b.dataset.stabIdx)===idx);
  });
}

function mcInner(d, pi){
  const rows=[
    {k:'TOT',lbl:'TOTAL',val:d.mTOT[pi],col:'#9CA3AF',bg:'#F3F4F6',tc:'var(--color-text-primary)'},
    {k:'DB', lbl:'DB',   val:d.mDB[pi],  col:'#5B0F9E',bg:'#EDE0FF',tc:'#5B0F9E'},
    {k:'KD', lbl:'KD',   val:d.mKD[pi],  col:'#A8D94A',bg:'#EEF9D0',tc:'#5A7A1A'},
  ];
  let h=`<div class="mc-ttl">Marge par client · ${P[pi]}</div><div class="mc-rows">`;
  rows.forEach((r,i)=>{
    const ref=REF[r.k], range=ref.suivi-ref.sans, ratio=(r.val-ref.sans)/range;
    const S=0.78, fp=Math.min(Math.max(ratio*S*100,0),100).toFixed(1), sp=(S*100).toFixed(1);
    const d2=r.val-ref.suivi, ds=(d2>=0?'+':'')+d2+' €', dc=d2>=0?'up':'dn';
    const bc=r.val>=ref.suivi?r.col:r.val>=ref.sans?'#D97706':'#C0392B';
    h+=`<div class="mc-row">
      <div class="mc-top">
        <div class="mc-dot" style="background:${r.bg};border:2px solid ${r.col}"></div>
        <span class="mc-brand" style="color:${r.tc}">${r.lbl}</span>
        <span class="mc-v" style="color:${r.tc}">${r.val.toLocaleString('fr-FR')} €</span>
        <span class="mc-d ${dc}">${ds} vs réf.</span>
      </div>
      <div class="mc-bs">
        <div class="mc-bw"><div class="mc-bf" style="width:${fp}%;background:${bc}"></div><div class="mc-mk" style="left:${sp}%"></div></div>
        <div class="mc-lg">
          <div class="mc-li" style="align-items:flex-start"><span class="mc-ll">Sans suivi</span><span class="mc-lv">${ref.sans.toLocaleString('fr-FR')} €</span></div>
          <div class="mc-li" style="align-items:flex-end"><span class="mc-ll">Avec suivi ▏</span><span class="mc-lv">${ref.suivi.toLocaleString('fr-FR')} €</span></div>
        </div>
      </div>
    </div>`;
    if(i<rows.length-1) h+=`<div class="mc-sep"></div>`;
  });
  h+=`</div><div class="mc-note">Le trait <strong>│</strong> = référence ALL "avec suivi". <span style="color:#5B0F9E;font-weight:600">■</span> au-dessus · <span style="color:#D97706;font-weight:600">■</span> entre les bornes · <span style="color:#C0392B;font-weight:600">■</span> sous sans-suivi.</div>`;
  return h;
}

function rangInner(d, pi){
  const rows=[
    {lbl:'Rang TOTAL', r:d.margeTOT[pi].r, v:d.margeTOT[pi].v, dot:''},
    {lbl:'Rang DB',    r:d.margeDB[pi].r,  v:d.margeDB[pi].v,  dot:'<span style="display:inline-block;width:8px;height:8px;background:#5B0F9E;border-radius:2px"></span>'},
    {lbl:'Rang KD',    r:d.margeKD[pi].r,  v:d.margeKD[pi].v,  dot:'<span style="display:inline-block;width:8px;height:8px;background:#A8D94A;border-radius:2px"></span>'},
  ];
  return rows.map(row=>{
    const col=row.r<=3?'c-g':row.r>=7?'c-r':'c-mu';
    return `<div class="rang-row">
      <div class="rang-lbl">${row.dot}${row.lbl}</div>
      <div class="rang-val ${col}">${row.r}<em> /9</em></div>
      <div class="rang-sub">${(row.v*100).toFixed(1)}% de la moyenne</div>
    </div>`;
  }).join('');
}

function buildChart(d, mode, uid){
  const W=560, H=200, PL=52, PR=16, PT=18, PB=38;
  const cW=W-PL-PR, cH=H-PT-PB;
  const n=P.length; // 4 periods, displayed oldest→newest (reversed)

  // Data in chronological order (oldest first = index 3→0)
  const idx=[3,2,1,0]; // juil-sept → oct-dec

  let seriesDB, seriesKD, seriesTOT, yLabel, refLines;

  if(mode==='marge'){
    seriesDB  = idx.map(i=>d.mDB[i]);
    seriesKD  = idx.map(i=>d.mKD[i]);
    seriesTOT = idx.map(i=>d.mTOT[i]);
    // reference lines: avec suivi per period (also reversed)
    refLines=[
      {y:[585,604,604,586].reverse().map((_,i)=>[585,604,604,586][idx[i]]), color:'#5B0F9E', label:'Réf. DB'},
      {y:[532,544,575,620].reverse().map((_,i)=>[532,544,575,620][idx[i]]), color:'#5A7A1A', label:'Réf. KD'},
    ];
    yLabel='€';
  } else if(mode==='ratio'){
    seriesDB  = idx.map(i=>d.mvsDB[i]);
    seriesKD  = idx.map(i=>d.mvsKD[i]);
    seriesTOT = idx.map(i=>d.mvsTOT[i]);
    refLines=[{y:[1,1,1,1], color:'#9CA3AF', label:'×1.0'}];
    yLabel='×';
  } else { // rang
    seriesDB  = idx.map(i=>d.margeDB[i].r);
    seriesKD  = idx.map(i=>d.margeKD[i].r);
    seriesTOT = idx.map(i=>d.margeTOT[i].r);
    refLines=[];
    yLabel='rang';
  }

  const allVals=[...seriesDB,...seriesKD,...seriesTOT,...(refLines.flatMap(r=>r.y))];
  let yMin=Math.min(...allVals), yMax=Math.max(...allVals);
  if(mode==='rang'){ yMin=1; yMax=9; }
  const pad=(yMax-yMin)*0.12||0.5;
  yMin=Math.max(mode==='rang'?1:0, yMin-pad);
  yMax=yMax+pad;

  const toX=i=>(i/(n-1))*cW+PL;
  const toY=v=>PT+cH-(((v-yMin)/(yMax-yMin))*cH);

  function polyline(series, color, dashed=false, fill=false){
    const pts=series.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    let out='';
    if(fill){
      const apts=`${toX(0).toFixed(1)},${(PT+cH).toFixed(1)} `+pts+` ${toX(n-1).toFixed(1)},${(PT+cH).toFixed(1)}`;
      out+=`<polygon points="${apts}" fill="${color}" class="chart-area"/>`;
    }
    out+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"${dashed?' stroke-dasharray="5,3"':''}/>`;
    // dots
    series.forEach((v,i)=>{
      out+=`<circle cx="${toX(i).toFixed(1)}" cy="${toY(v).toFixed(1)}" r="4" fill="${color}" stroke="var(--color-background-primary)" stroke-width="2"/>`;
      // value label
      const lx=toX(i), ly=toY(v)-10;
      const fmt=mode==='marge'?v.toLocaleString('fr-FR')+'€':mode==='ratio'?'×'+v.toFixed(2):v;
      out+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-size="9" font-family="var(--mono)" fill="${color}" font-weight="600">${fmt}</text>`;
    });
    return out;
  }

  // Y axis labels
  const yTicks=4;
  let yAxisSvg='';
  for(let t=0;t<=yTicks;t++){
    const v=yMin+(yMax-yMin)*(t/yTicks);
    const y=toY(v);
    const fmt=mode==='marge'?Math.round(v)+'€':mode==='ratio'?'×'+v.toFixed(1):Math.round(v);
    yAxisSvg+=`<text x="${PL-6}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" font-family="var(--mono)" fill="var(--color-text-secondary)" opacity=".7">${fmt}</text>`;
    yAxisSvg+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="var(--color-border-tertiary)" stroke-width="1"/>`;
  }

  // X axis labels — chronological order oldest→newest
  const labels=idx.map(i=>P[i]);
  let xAxisSvg='';
  labels.forEach((lbl,i)=>{
    xAxisSvg+=`<text x="${toX(i).toFixed(1)}" y="${(PT+cH+16).toFixed(1)}" text-anchor="middle" font-size="9" font-family="var(--font)" fill="var(--color-text-secondary)">${lbl}</text>`;
  });

  // ref lines
  let refSvg='';
  refLines.forEach(r=>{
    const pts=r.y.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    refSvg+=`<polyline points="${pts}" fill="none" stroke="${r.color}" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>`;
  });

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yAxisSvg}
    ${refSvg}
    ${polyline(seriesTOT,'#9CA3AF',true,false)}
    ${polyline(seriesDB,'#5B0F9E',false,true)}
    ${polyline(seriesKD,'#5A7A1A',false,true)}
    ${xAxisSvg}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="var(--color-border-tertiary)" stroke-width="1"/>
  </svg>`;
}

function buildGlobalClassements(){
  let h='<div class="hcard"><div class="av" style="background:#E6F1FB;color:#185FA5;border-color:#93C5FD;font-size:13px;font-weight:700">CL</div><div class="hinfo"><div class="hname">Classements globaux</div><div class="hsub">Marge vs moyenne équipe · toutes diéts · 3 périodes</div><div><span class="bdg bdg-all">Vue comparative</span></div></div></div><div class="an-sec">';

    const bCol=brand==='DB'?'var(--db)':brand==='KD'?'var(--kd-d)':'#374151';
    const rwC=brand==='DB'?'rw-db':brand==='KD'?'rw-kd':'rw-tot';

    const rankMaps=P.map((_,pi)=>{
      const sorted=[...diets].sort((a,b)=>getV(b,pi)-getV(a,pi));

function buildGlobalLTVForPeriod(pi){
  // pi = period index (0 = most recent)
  const periodLabel = P[pi] || P[0];
  const maSuDB_pi = allData.maSuDB[pi]||allData.maSuDB[0];
  const maSuKD_pi = allData.maSuKD[pi]||allData.maSuKD[0];
  const maSnDB_pi = allData.maSnDB[pi]||allData.maSnDB[0];
  const maSnKD_pi = allData.maSnKD[pi]||allData.maSnKD[0];

  let h = '';
  ['DB','KD'].forEach(brand=>{
    const isDB=brand==='DB';
    const bBg=isDB?'var(--db-l)':'var(--kd-l)', bCol=isDB?'var(--db)':'var(--kd-d)';
    const rwC=isDB?'rw-db':'rw-kd', cC=isDB?'c-db':'c-kd';
    const refS=isDB?maSuDB_pi:maSuKD_pi, refN=isDB?maSnDB_pi:maSnKD_pi;
    const sorted=[...diets].sort((a,b)=>(isDB?b.mvsDB[pi]:b.mvsKD[pi])-(isDB?a.mvsDB[pi]:a.mvsKD[pi]));
    h+=`<div style="margin-bottom:20px"><div class="b-hd" style="background:${bBg};color:${bCol};border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid var(--color-border-tertiary)">${bp(brand)}<span>${isDB?'Dietbon':'KitchenDiet'} — ratio vs hors-suivi · ${periodLabel}</span><span style="margin-left:auto;font-size:11px;font-family:var(--mono)">Réf. avec suivi: ${refS}€ · sans: ${refN}€</span></div>
    <div class="tw" style="border:1px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden"><table>
    <thead><tr><th>Diét</th><th>Statut</th><th>Clients</th><th>Pool%</th><th>Marge (€)</th><th>× vs hors-suivi</th><th>vs moy. équipe</th><th></th></tr></thead><tbody>`;
    sorted.forEach((d)=>{
      const mvs=(d.mvsDB&&d.mvsKD)?( isDB?d.mvsDB[pi]:d.mvsKD[pi] ):0;
      const m=isDB?(d.mDB[pi]||0):(d.mKD[pi]||0);
      const pool=isDB?(d.poolDB[pi]||0):(d.poolKD[pi]||0);
      const cl=isDB?(d.cDB[pi]||0):(d.cKD[pi]||0);
      const vsEqObj=isDB?d.margeDB[pi]:d.margeKD[pi];
      const vsEq=vsEqObj?vsEqObj.v:0;
      const rk=vsEqObj?vsEqObj.r:'-';
      const clMvs=mvs>=(isDB?1.3:1.8)?'c-g':mvs>=(isDB?1.1:1.3)?'c-a':'c-r';
      h+=`<tr class="${rwC}"><td><div style="display:flex;align-items:center;gap:6px"><span class="rk ${rC(rk)}" style="width:22px;height:22px;font-size:10px">${rk}</span><div style="width:24px;height:24px;border-radius:50%;background:${d.bg};color:${d.fg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${d.ini}</div><span style="font-size:12.5px;font-weight:500">${d.name}</span></div></td>
      <td><span class="bdg ${d.status==='int'?'bdg-int':'bdg-ext'}" style="font-size:10px">${d.status==='int'?'Int.':'Ext.'}</span></td>
      <td style="font-family:var(--mono)">${cl}</td><td style="font-family:var(--mono)">${pool.toFixed(1)}%</td>
      <td class="${cC}" style="font-family:var(--mono);font-weight:600">${m.toLocaleString('fr-FR')} €</td>
      <td class="${clMvs}" style="font-family:var(--mono);font-weight:700">×${(mvs||0).toFixed(2)}</td>
      <td class="${vsEq>=1?'c-g':'c-r'}">${pct(vsEq)}</td>
      <td>${bbar(vsEq,brand)}</td></tr>`;
    });
    h+=`</tbody></table></div><div class="ref-bar"><strong>ALL ${brand} ${periodLabel}</strong> · avec suivi: <strong>${refS}€</strong> · sans suivi: <strong>${refN}€</strong></div></div>`;
  });
  // TOTAL
  const sortedTot=[...diets].sort((a,b)=>(b.mvsTOT[pi]||0)-(a.mvsTOT[pi]||0));
  h+=`<div style="margin-bottom:20px"><div class="b-hd" style="background:#F3F4F6;color:#374151;border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid var(--color-border-tertiary)">${bp('TOTAL')}<span>Vue TOTAL — Ratio vs hors-suivi · ${periodLabel}</span></div>
  <div class="tw" style="border:1px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden"><table>
  <thead><tr><th>Diét</th><th>Statut</th><th>Clients tot.</th><th>Marge TOTAL (€)</th><th>× vs hors-suivi</th><th>vs moy. équipe</th><th></th></tr></thead><tbody>`;
  sortedTot.forEach(d=>{
    const mvs=d.mvsTOT[pi]||0;
    const clMvs=mvs>=1.5?'c-g':mvs>=1.3?'c-a':'c-r';
    const totObj=d.margeTOT[pi];
    h+=`<tr class="rw-tot"><td><div style="display:flex;align-items:center;gap:6px"><span class="rk ${rC(totObj?totObj.r:'-')}" style="width:22px;height:22px;font-size:10px">${totObj?totObj.r:'-'}</span><div style="width:24px;height:24px;border-radius:50%;background:${d.bg};color:${d.fg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${d.ini}</div><span style="font-size:12.5px;font-weight:500">${d.name}</span></div></td>
    <td><span class="bdg ${d.status==='int'?'bdg-int':'bdg-ext'}" style="font-size:10px">${d.status==='int'?'Int.':'Ext.'}</span></td>
    <td style="font-family:var(--mono)">${(d.cDB[pi]||0)+(d.cKD[pi]||0)}</td>
    <td style="font-family:var(--mono);font-weight:600">${(d.mTOT[pi]||0).toLocaleString('fr-FR')} €</td>
    <td class="${clMvs}" style="font-family:var(--mono);font-weight:700">×${mvs.toFixed(2)}</td>
    <td class="${totObj&&totObj.v>=1?'c-g':'c-r'}">${pct(totObj?totObj.v:0)}</td>
    <td>${bbar(totObj?totObj.v:0,'TOTAL')}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

function buildGlobalLTV(){
  let h='<div class="hcard"><div class="av" style="background:#E1F5EE;color:#0F6E56;border-color:#6EE7B7;font-size:11px;font-weight:700">×</div><div class="hinfo"><div class="hname">Perf. vs hors-suivi — Vue globale</div><div class="hsub" id="ltv-period-sub">Ratio Marge Diet / Marge hors-suivi · '+P[0]+' · DB & KD</div><div><span class="bdg" style="background:#E1F5EE;color:#0F6E56;border:1px solid #6EE7B7">Point fixe indépendant des périodes</span></div></div></div>';

  // Period selector
  h += '<div style="display:flex;gap:6px;padding:12px 0 4px 0;flex-wrap:wrap;" id="ltv-period-btns">';
  P.forEach((lbl,pi)=>{
    h += `<button class="ct-btn${pi===0?' on':''}" data-ltv-pi="${pi}" onclick="switchLTVPeriod(${pi})">${lbl}</button>`;
  });
  h += '</div>';

  h += '<div id="ltv-content" class="an-sec">' + buildGlobalLTVForPeriod(0) + '</div>';
  return h + '</div>';
}

function switchLTVPeriod(pi){
  document.getElementById('ltv-content').innerHTML = buildGlobalLTVForPeriod(pi);
  document.getElementById('ltv-period-sub').textContent = 'Ratio Marge Diet / Marge hors-suivi · ' + P[pi] + ' · DB & KD';
  document.querySelectorAll('[data-ltv-pi]').forEach(b=>{
    b.classList.toggle('on', parseInt(b.dataset.ltvPi)===pi);
  });
}

const nav=document.getElementById('nav'), panels=document.getElementById('panels');

const _navItems=[];
function activateNav(pid){
  _navItems.forEach(x=>x.btn.classList.toggle('on', x.pid===pid));
  document.querySelectorAll('#panels>.panel').forEach(p=>p.classList.toggle('on', p.id===pid));
}
function addNav(btn, pid, html){
  _navItems.push({btn,pid});
  btn.onclick=()=>activateNav(pid);
  nav.appendChild(btn);
  const p=document.createElement('div'); p.className='panel'; p.id=pid; p.innerHTML=html;
  panels.appendChild(p);
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRl4Z1ggdM3n5vuDab68DWHGn8Ee_DJ1-F_gEEXuh83yaPTqZqRNOwQzFN0Lc3xSRMeg/exec';

function setStatus(msg) {
  const el = document.getElementById('load-status');
  if(el) el.textContent = msg;
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if(el) el.style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('loading-overlay');
  if(el) el.innerHTML = `<div style="text-align:center;padding:40px;font-family:'DM Sans',sans-serif">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div style="font-size:15px;font-weight:600;color:#374151;margin-bottom:8px">Impossible de charger les données</div>
    <div style="font-size:13px;color:#6B7280;max-width:400px">${msg}</div>
    <button onclick="location.reload()" style="margin-top:20px;padding:8px 20px;border-radius:8px;border:1.5px solid #5B0F9E;background:#EDE0FF;color:#5B0F9E;font-weight:600;cursor:pointer">Réessayer</button>
  </div>`;
}

// Parse the raw 2D array from Apps Script into structured data
function parseSheetData(rows) {
  setStatus('Analyse de la structure…');

  // Row 0 (index 0) = observation dates (ISO "2026-05-18" or "M/YY" like "5/26")
  // Row 1 (index 1) = period labels like "11/25 à 01/26"
  // Row 2 (index 2) = header: Marque | Catégorie | Diet | periods...
  const obsRow   = rows[0] || [];
  const labelRow = rows[1] || [];

  // Parse an observation date cell → JS Date
  function parseObsDate(raw) {
    if(!raw) return null;
    const s = String(raw).trim();
    // ISO with timezone "2026-05-17T22:00:00.000Z" — Apps Script actual format
    if(s.includes('T')) {
      const d = new Date(s);
      if(!isNaN(d)) {
        // Add one day to compensate for UTC offset (date in sheet is local date)
        return new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
      }
    }
    // ISO "2026-05-18"
    const m1 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m1) return new Date(parseInt(m1[1]), parseInt(m1[2])-1, parseInt(m1[3]));
    // "M/YY" e.g. "5/26"
    const m2 = s.match(/^(\d{1,2})\/(\d{2})$/);
    if(m2) return new Date(2000+parseInt(m2[2]), parseInt(m2[1])-1, 18);
    // French "18-mai-2026"
    const mFr = {jan:0,fév:1,mar:2,avr:3,mai:4,jun:5,jul:6,aoû:7,sep:8,oct:9,nov:10,déc:11};
    const m3 = s.match(/(\d+)-([a-zéû]+)-(\d{4})/i);
    if(m3) { const mo=mFr[m3[2].toLowerCase().slice(0,3)]; if(mo!==undefined) return new Date(parseInt(m3[3]),mo,parseInt(m3[1])); }
    return null;
  }

  // Find header row and build periodCols with {col, label, obsDate}
  let headerRow = -1;
  let periodCols = []; // {col, label, obsDate}

  // ALWAYS read period labels from labelRow (rows[1]) and obs dates from obsRow (rows[0])
  // Find header row just to know dataStart
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (String(r[0]||'').trim()==='Marque' || String(r[1]||'').trim()==='Catégorie') {
      headerRow = i;
      break;
    }
  }
  if(headerRow === -1) headerRow = 2; // default

  // Read period labels from labelRow (rows[1]) — always
  for (let c = 3; c < labelRow.length; c++) {
    const lbl = String(labelRow[c]||'').trim();
    if (lbl && lbl.includes('/') && lbl.length > 3 && !lbl.startsWith('//')) {
      const obsDate = parseObsDate(obsRow[c]);
      periodCols.push({col:c, label:lbl, obsDate});
    }
  }

  if (periodCols.length === 0) throw new Error('Aucune période trouvée dans le sheet.');

  // Format period labels
  function formatDatePeriod(d) {
    if (!d) return '';
    const months=['','Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    if (d instanceof Date) {
      return months[d.getMonth()+1] + ' ' + String(d.getFullYear()).slice(2);
    }
    const s = String(d).trim();
    // Handle "11/25 à 01/2026" or "11/25 à 01/26"
    // Format: startMonth/startYear à endMonth/endYear
    const m = s.match(/(\d+)\/(\d+)\s*[àa]\s*(\d+)\/(\d+)/);
    if (m) {
      const startMonth = parseInt(m[1]);
      const endMonth   = parseInt(m[3]);
      const endYearRaw = m[4];
      // Use END year for the label (more meaningful for cross-year periods)
      const endYear = endYearRaw.length === 4 ? parseInt(endYearRaw) : 2000 + parseInt(endYearRaw);
      return months[startMonth] + '–' + months[endMonth] + ' ' + endYear;
    }
    // Handle single "10/25"
    const m2 = s.match(/(\d+)\/(\d+)/);
    if (m2) return months[parseInt(m2[1])] + ' ' + (2000+parseInt(m2[2]));
    return s;
  }

  // Sort periods newest-first by converting labels to sortable dates
  // Column order in sheet: D=newest, E, F, G, H=oldest
  // Since we read left to right from col 4, order is already newest first
  const periodLabels = periodCols.map(p => formatDatePeriod(p.label)||String(p.label));
  const periodObsDates = periodCols.map(p => p.obsDate); // observation cutoff per period
  const nPeriods = periodCols.length;

  setStatus(`${nPeriods} période(s) détectée(s)…`);

  // ── Build lookup from all data rows ──
  // key: "MARQUE|CATEGORIE|DIET" → array of values per period
  const lookup = {};
  const dataStart = headerRow + 1;

  for (let i = dataStart; i < rows.length; i++) {
    const r = rows[i];
    const marque = String(r[0]||'').trim();
    const cat    = String(r[1]||'').trim();
    const rawDiet = r[2];
    if (typeof rawDiet === 'number') continue;  // skip numeric rows
    const diet   = String(rawDiet||'').trim().toLowerCase();
    if (!marque || !cat) continue;
    if (/^\d/.test(diet)) continue;  // skip rows starting with digit

    const key = marque + '|' + cat + '|' + (diet||'all');
    const vals = periodCols.map(p => {
      const v = r[p.col];
      if (v === null || v === undefined || v === '' || v === 0) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    });
    lookup[key] = vals;
  }

  function get(marque, cat, diet) {
    const key = marque + '|' + cat + '|' + (diet||'all').toLowerCase();
    return lookup[key] || Array(nPeriods).fill(0);
  }

  function getNonNull(marque, cat, diet) {
    const v = get(marque, cat, diet);
    return v.map(x => x === null ? 0 : x);
  }

  // ── ALL data ──
  const maSuDB_ = getNonNull('DB','Marge Avec suivi','all');
  const maSuKD_ = getNonNull('KD','Marge Avec suivi','all');
  const maSnDB_ = getNonNull('DB','Marge Sans suivi','all');
  const maSnKD_ = getNonNull('KD','Marge Sans suivi','all');
  const maAllDB_ = getNonNull('DB','Marge','all');   // marge ALL clients (avec + sans)
  const maAllKD_ = getNonNull('KD','Marge','all');   // marge ALL clients (avec + sans)

  const newAllData = {
    margeDB:  maSuDB_.map((v,i) => maSnDB_[i] ? parseFloat((v/maSnDB_[i]).toFixed(4)) : 0),
    margeKD:  maSuKD_.map((v,i) => maSnKD_[i] ? parseFloat((v/maSnKD_[i]).toFixed(4)) : 0),
    // Marge Diet Vs ALL = marge avec suivi / marge ALL (tous clients)
    vsAllDB:  maSuDB_.map((v,i) => maAllDB_[i] ? parseFloat((v/maAllDB_[i]).toFixed(4)) : 0),
    vsAllKD:  maSuKD_.map((v,i) => maAllKD_[i] ? parseFloat((v/maAllKD_[i]).toFixed(4)) : 0),
    totCDB:   getNonNull('DB','Clients recrutés','all'),
    totCKD:   getNonNull('KD','Clients recrutés','all'),
    maSuDB:   maSuDB_,
    maSuKD:   maSuKD_,
    maSnDB:   maSnDB_,
    maSnKD:   maSnKD_,
    maAllDB:  maAllDB_,
    maAllKD:  maAllKD_,
  };

  // ── REF from most recent period (index 0 = newest column) ──
  const newREF = {
    DB:  { sans: newAllData.maSnDB[0]||447,  suivi: newAllData.maSuDB[0]||586 },
    KD:  { sans: newAllData.maSnKD[0]||306,  suivi: newAllData.maSuKD[0]||620 },
    TOT: { sans: getNonNull('TOTAL','Marge Sans suivi','all')[0]||400,
           suivi: getNonNull('TOTAL','Marge Avec suivi','all')[0]||591 }
  };

  // Moy equipe per period
  const moyDB  = newAllData.maSuDB;
  const moyKD  = newAllData.maSuKD;
  const moyTOT = getNonNull('TOTAL','Marge Avec suivi','all');

  // ── Auto-detect all diet names from sheet ──
  const detectedDiets = new Set();
  for (let i = dataStart; i < rows.length; i++) {
    const raw = rows[i][2];
    // Skip numeric values, empty, 'all', 'Diet' header
    if (raw === null || raw === undefined) continue;
    if (typeof raw === 'number') continue;  // excludes 1017, 363, etc.
    const diet = String(raw).trim();
    if (!diet || diet.toLowerCase() === 'all' || diet.toLowerCase() === 'diet') continue;
    if (/^\d/.test(diet)) continue;  // starts with digit = not a name
    // Capitalize first letter to normalize
    const normalized = diet.charAt(0).toUpperCase() + diet.slice(1);
    detectedDiets.add(normalized);
  }
  // Update DIET_META with any new diets from sheet
  detectedDiets.forEach(name => {
    if (!DIET_META[name]) {
      DIET_META[name] = getDietMeta(name);
    }
  });

  // ── Build diets ──
  const dietNames = [...detectedDiets].sort();
  const newDiets = [];

  setStatus(`${dietNames.length} diéts détectées…`);

  for (const name of dietNames) {
    const meta = getDietMeta(name);
    const dKey = name.toLowerCase();

    const mDB  = getNonNull('DB','Marge',dKey);
    const mKD  = getNonNull('KD','Marge',dKey);
    const mTOT = getNonNull('TOTAL','Marge',dKey);
    const cDB  = getNonNull('DB','Clients recrutés',dKey);
    const cKD  = getNonNull('KD','Clients recrutés',dKey);

    // Pool = clients diet / clients total ALL
    const totCDB = getNonNull('DB','Clients recrutés','all');
    const totCKD = getNonNull('KD','Clients recrutés','all');
    const totCTOT= getNonNull('TOTAL','Clients recrutés','all');
    const poolDB  = cDB.map((v,i)  => totCDB[i]  ? parseFloat((v/totCDB[i]*100).toFixed(2))  : 0);
    const poolKD  = cKD.map((v,i)  => totCKD[i]  ? parseFloat((v/totCKD[i]*100).toFixed(2))  : 0);

    // Marge Diet Vs hors suivi — try to read from sheet first, calculate fallback
    let mvsDB  = get('DB','Marge Diet Vs Marge hors suivi',dKey);
    let mvsKD  = get('KD','Marge Diet Vs Marge hors suivi',dKey);
    let mvsTOT = get('TOTAL','Marge Diet Vs Marge hors suivi',dKey);

    // If sheet values are 0 or null (formulas not evaluated), compute manually
    mvsDB  = mvsDB.map((v,i)  => (v && v>0) ? v : (newAllData.maSnDB[i]  ? parseFloat((mDB[i]/newAllData.maSnDB[i]).toFixed(4))  : 0));
    mvsKD  = mvsKD.map((v,i)  => (v && v>0) ? v : (newAllData.maSnKD[i]  ? parseFloat((mKD[i]/newAllData.maSnKD[i]).toFixed(4))  : 0));
    mvsTOT = mvsTOT.map((v,i) => (v && v>0) ? v : (newREF.TOT.sans       ? parseFloat((mTOT[i]/newREF.TOT.sans).toFixed(4))       : 0));

    // Ratios vs moy equipe
    const ratioMoyDB  = mDB.map((v,i)  => moyDB[i]  ? parseFloat((v/moyDB[i]).toFixed(4))  : 0);
    const ratioMoyKD  = mKD.map((v,i)  => moyKD[i]  ? parseFloat((v/moyKD[i]).toFixed(4))  : 0);
    const ratioMoyTOT = mTOT.map((v,i) => moyTOT[i] ? parseFloat((v/moyTOT[i]).toFixed(4)) : 0);

    newDiets.push({
      name, ...getDietMeta(name),
      summary: `Données live · ${periodLabels[0]}`,
      margeDB:  ratioMoyDB.map(v=>({v,r:0})),
      margeKD:  ratioMoyKD.map(v=>({v,r:0})),
      margeTOT: ratioMoyTOT.map(v=>({v,r:0})),
      mvsDB, mvsKD, mvsTOT,
      mDB, mKD, mTOT,
      poolDB, poolKD, cDB, cKD,
      m0DB: mDB[0]||0, m0KD: mKD[0]||0, m0TOT: mTOT[0]||0,
      atot: `<strong>${name}</strong> — marge TOTAL : <strong>${(mTOT[0]||0).toLocaleString('fr-FR')} €</strong> · période ${periodLabels[0]}.`,
      adb:  `Sur <strong>Dietbon</strong>, ${name} génère <strong>${(mDB[0]||0).toLocaleString('fr-FR')} €</strong> de marge par client · ×${(mvsDB[0]||0).toFixed(2)} vs hors-suivi · ${cDB[0]||0} clients.`,
      akd:  `Sur <strong>KitchenDiet</strong>, ${name} génère <strong>${(mKD[0]||0).toLocaleString('fr-FR')} €</strong> de marge par client · ×${(mvsKD[0]||0).toFixed(2)} vs hors-suivi · ${cKD[0]||0} clients.`,
      verdict: `Données mises à jour automatiquement depuis Google Sheets · ${new Date().toLocaleDateString('fr-FR')}.`
    });
  }

  // ── Compute ranks per period ──
  for (let pi = 0; pi < nPeriods; pi++) {
    ['DB','KD','TOT'].forEach(brand => {
      const key = 'marge'+brand;
      const mKey = brand==='DB'?'mDB':brand==='KD'?'mKD':'mTOT';
      const sorted = [...newDiets].sort((a,b) => (b[mKey][pi]||0)-(a[mKey][pi]||0));
      sorted.forEach((d,i) => {
        const dd = newDiets.find(x=>x.name===d.name);
        dd[key][pi].r = i+1;
      });
    });
  }

  return { newAllData, newREF, newDiets, periodLabels, periodObsDates };
}

// PARSE KPI HEBDO SHEET
// ══════════════════════════════════════════════
function parseHebdoData(rows) {
  if(!rows || rows.length < 10) return null;

  // ── Build week map from anchor date ──
  // Anchor: col 7 (idx 7) = week 14 of 2025 = 31/03/2025
  // Row 5 (idx 4) has week numbers, cols starting at idx 3
  const weekRow = rows[4] || [];
  const ANCHOR_COL = 7;
  const ANCHOR_DATE = new Date(2025, 2, 31); // 31 March 2025 = week 14 2025

  const weekMap = []; // {col, week, year, date, label}
  for(let i = 3; i < weekRow.length; i++) {
    const v = weekRow[i];
    // Calculate date from anchor regardless of whether row5 has week number
    const msOffset = (i - ANCHOR_COL) * 7 * 24 * 3600 * 1000;
    const d = new Date(ANCHOR_DATE.getTime() + msOffset);
    
    let weekNum;
    if(v !== null && v !== undefined && v !== '' && !isNaN(parseFloat(v))) {
      // Row 5 has explicit week number (cols up to S52)
      weekNum = Math.round(parseFloat(v));
    } else {
      // Row 5 has formula result for 2026+ weeks — compute from date
      // ISO week number
      const jan4 = new Date(d.getFullYear(), 0, 4);
      const startOfWeek1 = new Date(jan4);
      startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
      weekNum = Math.round((d - startOfWeek1) / (7 * 24 * 3600 * 1000)) + 1;
      if(weekNum < 1) weekNum = 52; // edge case
      if(weekNum > 53) weekNum = 1;
    }
    
    let yr = d.getFullYear();
    // Cross-year fix
    if(d.getMonth() === 0 && weekNum > 50) yr--;
    else if(d.getMonth() === 11 && weekNum < 5) yr++;
    
    // Only include weeks that have data in the KEY rows (taux de vente sections)
    // Check rows 183 (TOTAL interne), 192 (GLOBAL), 173 (header area)
    // and occupation row 46 (TOTAL)
    // Use rows 173-193 range (taux de vente section) + rows 36-46 (occupation)
    const keyRowIdxs = [182, 191, 192, 45, 260, 279]; // TOTAL interne, TOTAL ext, GLOBAL, occ total, joign totals
    const hasKeyData = keyRowIdxs.some(ri => {
      if(ri >= rows.length) return false;
      const v = rows[ri][i];
      return v !== null && v !== undefined && v !== '' && !isNaN(parseFloat(v)) && parseFloat(v) > 0;
    });
    // Also check any individual diet row in vente section (rows 174-181, 184-191)
    const venteRows = [173,174,175,176,177,178,179,180,181,184,185,186,187,188,189,190,191,192];
    const hasVenteData = venteRows.some(ri => {
      if(ri >= rows.length) return false;
      const v = rows[ri][i];
      return v !== null && v !== undefined && v !== '' && !isNaN(parseFloat(v)) && parseFloat(v) > 0;
    });
    if(!hasKeyData && !hasVenteData) continue;
    
    weekMap.push({col:i, week:weekNum, year:yr, date:d,
      label: yr+'-S'+(weekNum<10?'0':'')+weekNum});
  }

  if(weekMap.length === 0) return null;

  // ── Period → weeks mapping ──
  // Given period string "11/25 à 01/26", find all weekMap entries whose date falls in those months
  function weeksForPeriod(periodStr) {
    if(!periodStr) return [];
    const m = String(periodStr).match(/(\d+)\/(\d+)\s*[àa]\s*(\d+)\/(\d+)/);
    if(!m) return [];
    const sm = parseInt(m[1]), sy = 2000+parseInt(m[2]);
    const em = parseInt(m[3]), ey = 2000+parseInt(m[4]);
    const startD = new Date(sy, sm-1, 1);
    const endD   = new Date(ey, em, 0); // last day of end month
    return weekMap.filter(w => w.date >= startD && w.date <= endD);
  }

  // Build period→weeks lookup (populated when LTV periods are known)
  const periodWeeks = {}; // "11/25 à 01/26" → [{col, week, year, ...}]

  // Helper: safe numeric
  function num(v) {
    if(v === null || v === undefined || v === '' || String(v).includes('DIV') || String(v).includes('REF')) return null;
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  }

  // ── Extract section: name→{name, vals[], weeks[]} ──
  function extractSection(rowDefs) {
    const result = {};
    rowDefs.forEach(({name, rowIdx}) => {
      if(rowIdx >= rows.length) return;
      const row = rows[rowIdx] || [];
      const vals = weekMap.map(w => num(row[w.col]));
      result[name.toLowerCase()] = {
        name, 
        vals,                          // parallel to weekMap
        weeks: weekMap.map(w=>w.week),
        years: weekMap.map(w=>w.year),
        labels: weekMap.map(w=>w.label)
      };
    });
    return result;
  }

  // ── TAUX DE VENTE (rows 173-193, idx 172-192) ──
  const venteInterne = extractSection([
    {name:'Anaïs',    rowIdx:174},
    {name:'Barbara',  rowIdx:175},
    {name:'Inès',     rowIdx:177},
    {name:'Sophiane', rowIdx:180},
    {name:'TOTAL',    rowIdx:182},
  ]);
  const venteExterne = extractSection([
    {name:'Amanda',   rowIdx:184},
    {name:'Axelle',   rowIdx:185},
    {name:'Charlotte',rowIdx:186},
    {name:'Louise',   rowIdx:188},
    {name:'Nathalie', rowIdx:190},
    {name:'Rose',     rowIdx:187},
    {name:'TOTAL',    rowIdx:191},
    {name:'GLOBAL',   rowIdx:192},
  ]);

  // ── TAUX D'OCCUPATION (rows 36-46, idx 35-45) ──
  const occupation = extractSection([
    {name:'Anaïs',    rowIdx:37},
    {name:'Barbara',  rowIdx:38},
    {name:'Inès',     rowIdx:40},
    {name:'Sophiane', rowIdx:43},
    {name:'TOTAL',    rowIdx:45},
  ]);

  // ── TAUX REMPLISSAGE AGENDA (rows 48-58, idx 47-57) ──
  const remplissage = extractSection([
    {name:'Anaïs',    rowIdx:49},
    {name:'Barbara',  rowIdx:50},
    {name:'Inès',     rowIdx:52},
    {name:'Sophiane', rowIdx:55},
    {name:'TOTAL',    rowIdx:57},
  ]);

  // ── JOIGNABILITÉ INTERNE (rows 251-261, idx 250-260) ──
  const joignInterne = extractSection([
    {name:'Anaïs',    rowIdx:252},
    {name:'Barbara',  rowIdx:253},
    {name:'Inès',     rowIdx:255},
    {name:'Sophiane', rowIdx:258},
    {name:'TOTAL',    rowIdx:260},
  ]);

  // ── JOIGNABILITÉ EXTERNE (rows 263-280, idx 262-279) ──
  const joignExterne = extractSection([
    {name:'Amanda',   rowIdx:264},
    {name:'Axelle',   rowIdx:267},
    {name:'Charlotte',rowIdx:269},
    {name:'Louise',   rowIdx:271},
    {name:'Nathalie', rowIdx:276},
    {name:'TOTAL',    rowIdx:279},
  ]);

  // ── NOTE CLIENT INTERNE (rows 283-293, idx 282-292) ──
  const noteInterne = extractSection([
    {name:'Anaïs',    rowIdx:284},
    {name:'Barbara',  rowIdx:285},
    {name:'Inès',     rowIdx:287},
    {name:'Sophiane', rowIdx:290},
    {name:'TOTAL',    rowIdx:292},
  ]);

  // ── NOTE CLIENT EXTERNE (rows 295-312, idx 294-311) ──
  const noteExterne = extractSection([
    {name:'Amanda',   rowIdx:296},
    {name:'Axelle',   rowIdx:299},
    {name:'Charlotte',rowIdx:301},
    {name:'Louise',   rowIdx:303},
    {name:'Nathalie', rowIdx:308},
    {name:'TOTAL',    rowIdx:311},
  ]);

  return {
    weekMap,
    weeksForPeriod,  // function: periodStr → weekMap entries
    venteInterne, venteExterne,
    occupation, remplissage,
    joignInterne, joignExterne,
    noteInterne, noteExterne,
  };
}

// ── Helper: get vals for a specific diet+KPI filtered to a period ──
function hebdoValsForPeriod(dietData, periodWeeksArr) {
  if(!dietData || !dietData.vals || !periodWeeksArr.length) return [];
  // Match by col index
  return periodWeeksArr.map(w => ({
    week: w.week, year: w.year, label: w.label,
    val: dietData.vals[periodWeeksArr[0].col - 3 + periodWeeksArr.indexOf(w)]
    // Actually use col directly:
  })).map((_,i) => {
    const w = periodWeeksArr[i];
    // Find position in weekMap
    const pos = _hebdoData ? _hebdoData.weekMap.findIndex(wm=>wm.col===w.col) : -1;
    return {week:w.week, year:w.year, label:w.label, val: pos>=0 ? dietData.vals[pos] : null};
  });
}

// ── Corrélation taux de vente ↔ marge ──
// For each diet + period: compute avg taux de vente during that period,
// cross with marge/client for same cohorte
// Map P[i] label back to raw period string for weeksForPeriod
// Get weekMap index of the LAST COMPLETE week BEFORE the observation date
// Logic: find ISO week of obsDate, return index of week (isoWeek - 1) in same year
function _getObsWeekIdx(pi, hebdo) {
  if(!hebdo) return hebdo ? hebdo.weekMap.length - 1 : -1;
  const obsDate = (window._obsDates && window._obsDates[pi]) 
    ? window._obsDates[pi] 
    : null;
  if(!obsDate) return hebdo.weekMap.length - 1;

  // Compute ISO week of obsDate
  // ISO week calculation — non-recursive to avoid infinite loop on Dec 28
  function isoWeekNum(yr) {
    // Number of ISO weeks in a given year: 52 or 53
    // A year has 53 weeks if Jan 1 is Thu, or if it's a leap year and Jan 1 is Wed
    const jan1 = new Date(yr, 0, 1).getDay(); // 0=Sun,1=Mon,...,6=Sat
    const isLeap = (yr%4===0 && yr%100!==0) || yr%400===0;
    return (jan1===4 || (isLeap && jan1===3)) ? 53 : 52;
  }
  function isoWeek(d) {
    const msPerWeek = 7*24*3600*1000;
    const yr = d.getFullYear();
    const jan4 = new Date(yr, 0, 4);
    // Start of ISO week 1 = Monday on or before Jan 4
    const startW1 = new Date(jan4.getTime() - ((jan4.getDay()+6)%7)*86400000);
    const wn = Math.floor((d - startW1) / msPerWeek) + 1;
    if(wn < 1) {
      // Belongs to previous year's last week
      return {w: isoWeekNum(yr-1), y: yr-1};
    }
    const lastWk = isoWeekNum(yr);
    if(wn > lastWk) return {w: 1, y: yr+1};
    return {w: wn, y: yr};
  }

  const {w: obsW, y: obsY} = isoWeek(obsDate);
  
  // Target: week obsW-1 of same year (or week 52/53 of previous year if obsW=1)
  let targetW = obsW - 1;
  let targetY = obsY;
  if(targetW < 1) {
    targetY = obsY - 1;
    // Last week of previous year
    const dec28prev = new Date(targetY, 11, 28);
    targetW = isoWeek(dec28prev).w;
  }

  // Find in weekMap
  let bestIdx = -1;
  for(let i = 0; i < hebdo.weekMap.length; i++) {
    const w = hebdo.weekMap[i];
    if(w.week === targetW && w.year === targetY) {
      bestIdx = i;
      break;
    }
  }
  // If not found exactly, find closest week before
  if(bestIdx === -1) {
    for(let i = 0; i < hebdo.weekMap.length; i++) {
      const w = hebdo.weekMap[i];
      const wAbs = w.year * 53 + w.week;
      const tAbs = targetY * 53 + targetW;
      if(wAbs <= tAbs) bestIdx = i;
    }
  }
  return bestIdx >= 0 ? bestIdx : hebdo.weekMap.length - 1;
}

// Get recruitment start week index for a period
function _getRecruitStartIdx(pi, hebdo) {
  if(!hebdo) return 0;
  const rawPeriod = _getRawPeriod(pi);
  if(!rawPeriod) return 0;
  const pWks = hebdo.weeksForPeriod(rawPeriod);
  if(!pWks.length) return 0;
  const firstCol = pWks[0].col;
  const idx = hebdo.weekMap.findIndex(w => w.col === firstCol);
  return idx >= 0 ? idx : 0;
}

// Get full observation window: from recruitment start to observation cutoff
function _getObsWindow(pi, hebdo) {
  if(!hebdo) return {idxs:[], weeks:[]};
  const startIdx = _getRecruitStartIdx(pi, hebdo);
  const endIdx   = _getObsWeekIdx(pi, hebdo);
  const idxs = [];
  for(let i = startIdx; i <= endIdx; i++) idxs.push(i);
  const weeks = idxs.map(i => hebdo.weekMap[i]);
  return {idxs, weeks};
}

function _getRawPeriod(pi) {
  // P[pi] is like "Nov–Jan 2026" → convert to "11/25 à 01/26"
  const months = {jan:1,fév:2,mar:3,avr:4,mai:5,jun:6,jul:7,aoû:8,sep:9,oct:10,nov:11,déc:12};
  const lbl = P[pi];
  if(!lbl) return null;
  const m = lbl.match(/([A-Za-zéû]+)[\s–-]+([A-Za-zéû]+)\s+(\d{4})/i);
  if(!m) return null;
  const endM = months[m[2].toLowerCase().slice(0,3)];
  const startM = months[m[1].toLowerCase().slice(0,3)];
  const endY = parseInt(m[3]);
  const startY = startM > endM ? endY - 1 : endY;
  const fmt = (mo,y) => (mo<10?'0':'')+mo+'/'+String(y).slice(2);
  return fmt(startM,startY)+' à '+fmt(endM,endY);
}

let _actPeriodIdx = 0;
let _hebdoData = null;
window._obsDates = [];

function computeCorrelation(diets, hebdo, pi) {
  if(!hebdo) return null;

  // Full observation window: from first recruitment week to last week before obs date
  const obsWin = _getObsWindow(pi, hebdo);
  if(!obsWin.idxs.length) return null;

  // Also get the marge for the matching period (same pi)
  const results = [];
  diets.forEach(d => {
    const dKey = d.name.toLowerCase();
    const vData = hebdo.venteInterne[dKey] || hebdo.venteExterne[dKey];
    
    // Marge for this specific period
    const marge = (d.mDB && d.mDB[pi] !== undefined) ? d.mDB[pi] : (d.mDB ? d.mDB[0] : 0);
    const mvsDB = (d.mvsDB && d.mvsDB[pi] !== undefined) ? d.mvsDB[pi] : (d.mvsDB ? d.mvsDB[0] : 0);

    if(!vData || !vData.vals) return;

    // Taux de vente sur la fenêtre complète d'observation
    const obsVals = obsWin.idxs.map(i => vData.vals[i]).filter(v => v !== null && !isNaN(v));
    
    // Exclude if no RDV data (all zeros or all null)
    const hasRdv = obsVals.some(v => v > 0);
    if(!hasRdv || !obsVals.length) return;

    const avgVente = obsVals.reduce((a,b)=>a+b,0) / obsVals.length;

    results.push({
      name: d.name,
      meta: getDietMeta(d.name),
      avgVente,
      marge: marge || 0,
      mvsDB: mvsDB || 0,
      weeksCount: obsVals.length,
      status: getDietMeta(d.name).status,
      obsStart: obsWin.weeks[0] ? obsWin.weeks[0].label : '?',
      obsEnd:   obsWin.weeks[obsWin.weeks.length-1] ? obsWin.weeks[obsWin.weeks.length-1].label : '?',
    });
  });

  results.sort((a,b) => b.avgVente - a.avgVente);

  // Pearson correlation r between avgVente (X) and marge (Y)
  if(results.length < 3) return {results, corr: null, obsWin};
  const n = results.length;
  const xs = results.map(r=>r.avgVente);
  const ys = results.map(r=>r.marge);
  const mx = xs.reduce((a,b)=>a+b)/n;
  const my = ys.reduce((a,b)=>a+b)/n;
  const num_c = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den = Math.sqrt(
    xs.reduce((s,x)=>s+(x-mx)**2,0) * ys.reduce((s,y)=>s+(y-my)**2,0)
  );
  const corr = den > 0 ? (num_c/den) : 0;

  return {results, corr, obsWin};
}

// Mini-panel activité hebdo dans les cards individuelles
function buildDietMiniHebdo(d, pi) {
  if(!_hebdoData) return '';
  const h_data = _hebdoData;
  const dKey = d.name.toLowerCase();
  const vData = h_data.venteInterne[dKey] || h_data.venteExterne[dKey];
  const nData = h_data.noteInterne[dKey] || h_data.noteExterne[dKey];
  const jData = h_data.joignInterne[dKey] || h_data.joignExterne[dKey];
  const oData = h_data.occupation[dKey];
  if(!vData && !nData && !oData) return '';
  const _obsWin = _getObsWindow(pi, h_data);
  const idxs8  = _obsWin.idxs;
  const weeks8 = _obsWin.weeks.map(w=>w.week);
  const startW = _obsWin.weeks[0]; const endW = _obsWin.weeks[_obsWin.weeks.length-1];
  const winLabel = (startW && endW) ? `S${startW.week} ${startW.year} → S${endW.week} ${endW.year}` : 'fenêtre d\'obs.';
  function spark(data,fmtFn,thG,thO){
    if(!data||!data.vals) return '<span style="font-size:11px;color:var(--color-text-secondary)">—</span>';
    const vals=idxs8.map(i=>data.vals[i]);
    const maxV=Math.max(...vals.filter(v=>v!==null).map(Math.abs),0.001);
    return '<div style="display:flex;align-items:flex-end;gap:2px;height:56px">'+
      vals.map((v,ii)=>{
        if(v===null) return '<div style="flex:1;background:var(--color-border-tertiary);opacity:.2;height:4px;border-radius:2px;align-self:flex-end"></div>';
        const hp=Math.max(Math.round((Math.abs(v)/maxV)*40),3);
        const clr=v>=thG?'#16a34a':v>=thO?'#d97706':'#dc2626';
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">'+
          '<div style="font-size:7px;color:'+clr+';font-weight:600">'+fmtFn(v)+'</div>'+
          '<div style="height:'+hp+'px;background:'+clr+';border-radius:2px;width:100%;opacity:.8"></div>'+
          '<div style="font-size:7px;color:var(--color-text-secondary)">S'+(weeks8[ii]||'?')+'</div>'+
        '</div>';
      }).join('')+'</div>';
  }
  let out=`<div class="ablk" style="margin-top:10px"><div class="ablk-t">📅 Fenêtre d'observation — ${winLabel}</div>`;
  out+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:8px">';
  if(vData) out+='<div><div style="font-size:10px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px">TAUX DE VENTE</div>'+spark(vData,v=>(v*100).toFixed(0)+'%',0.2,0.1)+'</div>';
  if(oData) out+='<div><div style="font-size:10px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px">OCCUPATION</div>'+spark(oData,v=>(v*100).toFixed(0)+'%',0.85,0.7)+'</div>';
  if(nData) out+='<div><div style="font-size:10px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px">NOTE /10</div>'+spark(nData,v=>v.toFixed(1),9,8)+'</div>';
  if(jData) out+='<div><div style="font-size:10px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px">JOIGNABILITÉ</div>'+spark(jData,v=>(v*100).toFixed(0)+'%',0.85,0.7)+'</div>';
  out+='</div></div>';
  return out;
}

  <div id="act-synthese-content">${buildSyntheseTable(last8Idxs, last8Weeks)}</div></div>`;

  // ── TAB TAUX DE VENTE ──

  h += `<div id="ACT-occupation" class="tab-c" style="display:none">
  <div id="act-occ-content">${buildOccTable(last8Idxs, last8Weeks)}</div></div>`;

  h += `</div>`;

  h += `<div id="ACT-joignabilite" class="tab-c" style="display:none">
  <div id="act-joign-content">${buildJoignTable(last8Idxs, last8Weeks)}</div></div>`;

  h += `<div id="ACT-correlation" class="tab-c" style="display:none">
  <div id="act-corr-content">${buildCorrPanel(0)}</div></div>`;

  return h;
}

function buildVenteTable(idxs, weeks) {
  if(!_hebdoData) return '';
  const h_data = _hebdoData;
  function pct(v){return v===null?'—':(v*100).toFixed(1)+'%';}
  function cl(v){return v===null?'':v>=0.2?'c-g':v>=0.1?'c-a':'c-r';}
  function row(key,name,src,badgeCls,badgeTxt){
    const d=h_data[src][key]; if(!d) return '';
    const vals=idxs.map(i=>d.vals[i]);
    // Exclude diet from avg if ALL values in period are 0 (no RDV)
    const hasRdv = vals.some(v=>v!==null && v>0);
    if(!hasRdv) return ''; // skip entirely if no RDV on this period
    const moy=vals.filter(v=>v!==null).reduce((a,b)=>a+b,0)/(vals.filter(v=>v!==null).length||1);
    const meta=getDietMeta(name);
    return `<tr><td><div style="display:flex;align-items:center;gap:5px">
      <div style="width:18px;height:18px;border-radius:50%;background:${meta.bg};color:${meta.fg};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700">${meta.ini}</div>

      ${vals.map(v=>`<td class="${cl(v)}" style="font-family:var(--mono)">${pct(v)}</td>`).join('')}
      <td class="${cl(moy)}" style="font-family:var(--mono);font-weight:700">${pct(moy)}</td></tr>`;
  }
  function totalRow(key,src,label){
    const d=h_data[src][key]; if(!d) return '';
    const vals=idxs.map(i=>d.vals[i]);
    const moy=vals.filter(v=>v!==null).reduce((a,b)=>a+b,0)/(vals.filter(v=>v!==null).length||1);
    return `<tr style="font-weight:700;background:var(--color-background-secondary)">
      <td colspan="2">${label}</td>
      ${vals.map(v=>`<td style="font-family:var(--mono)">${v!==null?(v*100).toFixed(1)+'%':'—'}</td>`).join('')}
      <td style="font-family:var(--mono);font-weight:700">${(moy*100).toFixed(1)}%</td></tr>`;
  }
  const wh = weeks.map(w=>`<th style="font-size:10px">S${w.week}<span style="opacity:.5;font-size:9px"> ${String(w.year).slice(2)}</span></th>`).join('');
  return `<div class="ltv-sec"><div class="ltv-hd"><span style="font-weight:700;font-size:12px">Taux de vente — ${weeks.length} semaines</span></div>
  <div class="tw"><table><thead><tr><th>Diét</th><th>Statut</th>${wh}<th>Moy.</th></tr></thead><tbody>
  <tr style="background:var(--db-l)"><td colspan="${2+weeks.length+1}" style="font-size:10px;font-weight:700;color:var(--db);padding:4px 8px">INTERNES</td></tr>

function buildCorrPanel(pi) {
  if(!_hebdoData) return '<div style="padding:20px;color:var(--color-text-secondary)">Données hebdo non disponibles</div>';
  const corrData = computeCorrelation(diets, _hebdoData, pi);
  
  const obsWin = corrData ? corrData.obsWin : null;
  const obsStart = obsWin && obsWin.weeks && obsWin.weeks[0] ? obsWin.weeks[0].label : '?';
  const obsEnd   = obsWin && obsWin.weeks && obsWin.weeks.length ? obsWin.weeks[obsWin.weeks.length-1].label : '?';
  let h = `<div class="ltv-sec">
  <div class="ltv-hd">
    <span style="font-weight:700;font-size:12px">Corrélation Taux de vente ↔ Marge — ${P[pi]||'Période actuelle'}</span>
    <span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px">Fenêtre d'observation : ${obsStart} → ${obsEnd}</span>
  </div>
  <div style="font-size:12px;color:var(--color-text-secondary);padding:8px 0 12px;line-height:1.7">
    <strong>Comment lire ce tableau :</strong> Pour chaque diét, on calcule le taux de vente moyen sur toutes les semaines entre le début du recrutement du pool (<strong>${obsStart}</strong>) et la semaine précédant la date d'observation (<strong>${obsEnd}</strong>). On compare ce taux à la marge par client générée sur la cohorte de la même période. Le coefficient <strong>r</strong> mesure si les deux variables varient dans le même sens : <span style="color:#16a34a">r proche de 1</span> = lien fort positif · <span style="color:#6b7280">r proche de 0</span> = pas de lien · <span style="color:#dc2626">r négatif</span> = lien inverse.
  </div>`;

  if(!corrData || !corrData.results.length) {
    return h + '<div style="padding:20px;color:var(--color-text-secondary);text-align:center">Pas assez de données pour cette période</div></div>';
  }

  const {results, corr} = corrData;

  // Correlation interpretation
  const corrAbs = Math.abs(corr||0);
  const corrColor = corrAbs >= 0.7 ? '#16a34a' : corrAbs >= 0.4 ? '#d97706' : '#6b7280';
  const corrLabel = corrAbs >= 0.7 ? 'Corrélation forte' : corrAbs >= 0.4 ? 'Corrélation modérée' : 'Corrélation faible';

  if(corr !== null) {
    h += `<div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      <div class="kpi-c" style="flex:1;min-width:140px">
        <div class="kpi-lbl">Coefficient de corrélation (r)</div>
        <div class="kpi-val" style="color:${corrColor}">${corr.toFixed(2)}</div>
        <div class="kpi-sub">${corrLabel} · ${results.length} diéts</div>
      </div>
      <div class="kpi-c" style="flex:2;min-width:200px">
        <div class="kpi-lbl">Interprétation</div>
        <div style="font-size:13px;color:var(--color-text-primary);line-height:1.6;margin-top:4px">
          ${corrAbs >= 0.7 ? `<strong>Lien significatif</strong> : les diéts qui ont le meilleur taux de vente sur la période tendent à générer une marge par client plus élevée. L'impact du suivi commercial sur la qualité du recrutement est mesurable.` :
            corrAbs >= 0.4 ? `<strong>Lien partiel</strong> : le taux de vente explique une partie de la marge, mais d'autres facteurs jouent (qualité du suivi post-vente, mix produit, profil client).` :
            `<strong>Lien non établi</strong> sur cette période. La marge ne suit pas le taux de vente — le profil client recruté et la qualité du suivi post-achat sont probablement plus déterminants.`}
        </div>
      </div>
    </div>`;
  }

  // Scatter table
  h += `<div class="tw"><table>
  <thead><tr>
    <th>Diét</th><th>Statut</th>
    <th>Taux de vente moy.<br><span style="font-weight:400;font-size:10px">sur la période</span></th>
    <th>Marge/client<br><span style="font-weight:400;font-size:10px">cohorte DB</span></th>
    <th>× vs hors-suivi<br><span style="font-weight:400;font-size:10px">même cohorte</span></th>
    <th>Semaines<br><span style="font-weight:400;font-size:10px">observées</span></th>
    <th>Signal</th>
  </tr></thead><tbody>`;

  // Compute team averages for reference
  const avgV = results.reduce((a,r)=>a+r.avgVente,0)/results.length;
  const avgM = results.reduce((a,r)=>a+r.marge,0)/results.length;

  results.forEach(r => {
    const vAbove = r.avgVente >= avgV;
    const mAbove = r.marge >= avgM;
    let signal, sigColor;
    if(vAbove && mAbove)      { signal='↑ Vente forte → Marge forte'; sigColor='#16a34a'; }
    else if(!vAbove && !mAbove){ signal='↓ Vente faible → Marge faible'; sigColor='#dc2626'; }
    else if(vAbove && !mAbove) { signal='⚠ Vente forte, marge décevante'; sigColor='#d97706'; }
    else                       { signal='◇ Vente faible, marge correcte'; sigColor='#6b7280'; }

    const vcl = r.avgVente>=0.2?'c-g':r.avgVente>=0.1?'c-a':'c-r';
    const mcl = r.marge>=avgM?'c-g':'c-r';
    h += `<tr>
      <td><div style="display:flex;align-items:center;gap:5px">
        <div style="width:20px;height:20px;border-radius:50%;background:${r.meta.bg};color:${r.meta.fg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${r.meta.ini}</div>
        ${r.name}</div></td>
      <td><span class="bdg ${r.status==='int'?'bdg-int':'bdg-ext'}" style="font-size:9px">${r.status==='int'?'Int.':'Ext.'}</span></td>
      <td class="${vcl}" style="font-family:var(--mono);font-weight:600">${(r.avgVente*100).toFixed(1)}%</td>
      <td class="${mcl}" style="font-family:var(--mono)">${r.marge.toLocaleString('fr-FR')} €</td>
      <td class="${r.mvsDB>=1.3?'c-g':r.mvsDB>=1.1?'c-a':'c-r'}" style="font-family:var(--mono)">×${r.mvsDB.toFixed(2)}</td>
      <td style="font-family:var(--mono);color:var(--color-text-secondary)">${r.weeksCount||0}</td>
      <td style="font-size:11px;font-weight:600;color:${sigColor}">${signal}</td>
    </tr>`;
  });

  h += `</tbody></table></div>
  <div class="ref-bar">Taux de vente moy. = moyenne sur ${obsStart} → ${obsEnd} · Marge/client = cohorte ${P[pi]||''} · Exclu si 0 RDV · <strong>r = ${corr!==null?corr.toFixed(2):'n/a'}</strong></div>
  </div>`;
  return h;
}

// Period selector for activity panel
function setActPeriod(pi) {
  _actPeriodIdx = pi;
  if(!_hebdoData) return;
  
  // Get full observation window for this period
  const _win = _getObsWindow(pi, _hebdoData);
  const idxs = _win.idxs;
  const wks  = _win.weeks;

  // Update button states
  document.querySelectorAll('[data-act-period]').forEach(b=>{
    b.classList.toggle('on', parseInt(b.dataset.actPeriod)===pi);
  });
  // Update window info label
  const _wl = document.getElementById('act-win-label');
  if(_wl) {
    const _ws = wks[0] ? wks[0].label : '?';
    const _we = wks[wks.length-1] ? wks[wks.length-1].label : '?';
    _wl.textContent = _ws + ' → ' + _we;
  }

  // Rebuild period-dependent tab contents
  const ve=document.getElementById('act-vente-content');
  const oc=document.getElementById('act-occ-content');
  const sa=document.getElementById('act-sat-content');
  const jo=document.getElementById('act-joign-content');
  const co=document.getElementById('act-corr-content');
  if(ve) ve.innerHTML = buildVenteTable(idxs,wks);
  if(oc) oc.innerHTML = buildOccTable(idxs,wks);
  if(sa) sa.innerHTML = buildSatTable(idxs,wks);
  if(jo) jo.innerHTML = buildJoignTable(idxs,wks);
  if(co) co.innerHTML = buildCorrPanel(pi);

  // Rebuild synthèse tab (now period-aware via avgVals)
  const sy=document.getElementById('act-synthese-content');
  if(sy) sy.innerHTML = buildSyntheseTable(idxs,wks);

  // Rebuild top KPI cards (moyennes sur la fenêtre)
  const tk=document.getElementById('act-top-kpis');
  if(tk) tk.innerHTML = buildTopKPIsHTML(idxs,wks);

  // Update semaine count in header
  const wc=document.getElementById('act-week-count');
  if(wc) wc.textContent = wks.length;

  // Rebuild diet mini-panels (spark charts) dans les cards individuelles
  diets.forEach(d=>{
    const _uid=d.name.replace(/[^a-z]/gi,'');
    const el=document.getElementById('diet-mini-'+_uid);
    if(el) el.innerHTML = buildDietMiniHebdo(d, pi);
  });
}

function buildDashboard({ newAllData, newREF, newDiets, periodLabels, periodObsDates, hebdo }) {
  setStatus('Construction du dashboard…');

  // Override global variables
  P.length=0; periodLabels.forEach(l=>P.push(l));
  // Store observation dates globally
  if(!window._obsDates) window._obsDates = [];
  window._obsDates.length=0;
  if(periodObsDates) periodObsDates.forEach(d=>window._obsDates.push(d));
  // DEBUG: show what obsdates were parsed
  Object.assign(REF, newREF);
  Object.assign(allData, newAllData);
  // Store hebdo data globally
  if(hebdo) _hebdoData = hebdo;

  // Ensure vsAll arrays are available globally for buildAll()
  allData.vsAllDB = newAllData.vsAllDB;
  allData.vsAllKD = newAllData.vsAllKD;
  allData.maAllDB = newAllData.maAllDB;
  allData.maAllKD = newAllData.maAllKD;
  diets.length=0; newDiets.forEach(d=>diets.push(d));

  // Clear nav and panels
  document.getElementById('nav').innerHTML='';
  document.getElementById('panels').innerHTML='';
  _navItems.length=0;

  // Rebuild
  const allBtn=document.createElement('button');
  allBtn.className='nb all-nb'; allBtn.textContent='ALL ∑';
  addNav(allBtn,'panel-ALL',buildAll());

  const clBtn=document.createElement('button');
  clBtn.className='nb nb-cl'; clBtn.textContent='Classements';
  addNav(clBtn,'panel-CL',buildGlobalClassements());

  const ltvBtn=document.createElement('button');
  ltvBtn.className='nb nb-ltv'; ltvBtn.textContent='Perf. × hors-suivi';
  addNav(ltvBtn,'panel-LTV',buildGlobalLTV());

  // ── ACTIVITÉ HEBDO ──
  const actBtn=document.createElement('button');
  actBtn.className='nb'; actBtn.style.cssText='background:#FFF3E0;color:#E65100;border-color:#FFCC80';
  actBtn.textContent='📅 Activité';
  let actHTML = '';
  try { actHTML = buildActivitePanel(); } catch(e) { 
    actHTML = '<div style="padding:30px;color:#dc2626">Erreur activité: '+e.message+'</div>'; 
    console.error('buildActivitePanel error:', e); 
  }
  addNav(actBtn,'panel-ACT',actHTML);

  diets.forEach(d=>{
    const uid=d.name.replace(/[^a-z]/gi,'');
    const btn=document.createElement('button');
    btn.className='nb';
    btn.innerHTML=`${d.name} <span style="font-size:10px;opacity:.55;margin-left:2px">${d.status}</span>`;
    let panelHTML = '';
    try { panelHTML = buildPanel(d); } catch(e) {
      panelHTML = '<div style="padding:30px;color:#dc2626">Erreur panel '+d.name+': '+e.message+'</div>';
      console.error('buildPanel error for '+d.name+':', e);
    }
    addNav(btn,`panel-${uid}`,panelHTML);
  });

  diets.forEach(d=>{
    const uid=d.name.replace(/[^a-z]/gi,'');
    regTabs(uid,['analyse','classement','perf','courbes']);
  });
  regTabs('ALL',['kpi','bases','lecture']);

  activateNav('panel-ALL');

  // Add last updated badge in nav
  const now = new Date();
  const badge = document.createElement('span');
  badge.style.cssText='font-size:10px;color:var(--color-text-secondary);padding:5px 10px;align-self:center;margin-left:auto;white-space:nowrap';
  badge.innerHTML = `🔄 Données : ${now.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})} ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('nav').appendChild(badge);

  hideLoading();
}

// ── LAUNCH ──
setStatus('Connexion à Google Sheets…');
// Safety: if nothing loads after 15s, show fallback
const _loadTimeout = setTimeout(()=>{
  console.warn('Load timeout — falling back to static data');
  try {
    buildDashboard({newAllData:allData,newREF:REF,newDiets:diets,periodLabels:P,hebdo:null,periodObsDates:window._obsDates||null});
  } catch(e) { showError('Timeout de chargement. Rechargez la page.'); }
}, 15000);

fetch(SCRIPT_URL)
  .then(r => {
    if(!r.ok) throw new Error('HTTP ' + r.status);
    setStatus('Données reçues, parsing…');
    return r.json();
  })
  .then(data => {
    // Handle both old format (array) and new format ({ltv, hebdo})
    const ltvRows   = Array.isArray(data) ? data : (data.ltv   || data);
    const hebdoRows = Array.isArray(data) ? null  : (data.hebdo || null);
    const parsed = parseSheetData(ltvRows);
    if(hebdoRows) {
      try { parsed.hebdo = parseHebdoData(hebdoRows); }
      catch(e) { console.warn('parseHebdoData failed:', e); parsed.hebdo = null; }
    }
    clearTimeout(_loadTimeout); buildDashboard({...parsed, hebdo: parsed.hebdo||null, periodObsDates: parsed.periodObsDates||null});
  })
  .catch(err => {
    clearTimeout(_loadTimeout);
    console.error('Erreur chargement sheet:', err);
    setStatus('Données live indisponibles — chargement données statiques…');
    setTimeout(() => {
      try {
        buildDashboard({newAllData:allData,newREF:REF,newDiets:diets,periodLabels:P,hebdo:null,periodObsDates:window._obsDates||null});
      } catch(e2) { showError('Erreur: '+e2.message); }
    }, 500);
  });
</script>
